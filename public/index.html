<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StockPulse - Real-time stock analytics dashboard with MongoDB Change Streams and WebSockets">
  <title>StockPulse — Real-Time Analytics</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
</head>
<body>

  <!-- Header -->
  <header class="header" id="header">
    <div class="logo">
      <div class="logo-icon">📈</div>
      <span>StockPulse</span>
    </div>
    <div class="header-right">
      <div class="connection-status" id="connectionStatus">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Connecting...</span>
      </div>
      <div class="live-clock" id="liveClock">--:--:--</div>
    </div>
  </header>

  <!-- Dashboard -->
  <div class="dashboard">

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">Total Ticks</div>
        <div class="stat-value accent" id="statTicks">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Symbols</div>
        <div class="stat-value" id="statSymbols">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Clients</div>
        <div class="stat-value" id="statClients">1</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Uptime</div>
        <div class="stat-value" id="statUptime">0s</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">MongoDB</div>
        <div class="stat-value" id="statMongo">--</div>
      </div>
    </div>

    <!-- Watchlist Sidebar -->
    <aside class="watchlist">
      <div class="search-container">
        <select id="popularSelect" class="search-select">
          <option value="" disabled selected>Add Popular...</option>
          <optgroup label="Stocks">
            <option value="AAPL">Apple (AAPL)</option>
            <option value="MSFT">Microsoft (MSFT)</option>
            <option value="GOOGL">Google (GOOGL)</option>
            <option value="AMZN">Amazon (AMZN)</option>
            <option value="TSLA">Tesla (TSLA)</option>
            <option value="NVDA">Nvidia (NVDA)</option>
            <option value="META">Meta (META)</option>
            <option value="NFLX">Netflix (NFLX)</option>
            <option value="AMD">AMD</option>
          </optgroup>
          <optgroup label="Crypto">
            <option value="BINANCE:BTCUSDT">Bitcoin (BTC)</option>
            <option value="BINANCE:ETHUSDT">Ethereum (ETH)</option>
            <option value="BINANCE:BNBUSDT">BNB</option>
            <option value="BINANCE:SOLUSDT">Solana (SOL)</option>
            <option value="BINANCE:DOGEUSDT">Doge (DOGE)</option>
          </optgroup>
        </select>
        <input type="text" id="stockSearch" placeholder="or type symbol..." autocomplete="off">
        <button id="addStockBtn">+</button>
      </div>
      <div class="watchlist-title">Watchlist</div>
      <div id="watchlistItems" class="watchlist-items"></div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Chart Panel -->
      <div class="chart-panel">
        <div class="chart-header">
          <div class="chart-title">
            <h2 id="chartSymbol">AAPL</h2>
            <span class="live-badge">LIVE</span>
          </div>
          <div class="chart-controls">
            <button class="chart-btn active" data-points="50">50</button>
            <button class="chart-btn" data-points="100">100</button>
            <button class="chart-btn" data-points="200">200</button>
          </div>
        </div>
        <div class="chart-wrapper">
          <canvas id="mainChart"></canvas>
        </div>
      </div>

      <!-- Activity Feed -->
      <div class="activity-panel">
        <div class="activity-header">Recent Activity</div>
        <div class="activity-feed" id="activityFeed"></div>
      </div>
    </main>

  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
